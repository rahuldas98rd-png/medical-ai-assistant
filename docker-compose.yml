services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data    # persist trained models + sqlite db
    restart: unless-stopped

  frontend:
    image: python:3.12-slim
    working_dir: /app
    command: >
      bash -c "pip install --no-cache-dir streamlit==1.41.1 requests==2.32.3 plotly==5.24.1 &&
               streamlit run frontend/app.py --server.address 0.0.0.0 --server.port 8501"
    ports:
      - "8501:8501"
    environment:
      - BACKEND_API_URL=http://backend:8000/api/v1
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      - backend
    restart: unless-stopped
